<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fourier Series Match</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px 10px; /* Moins de padding latéral sur mobile */
        }
        
        h1 { margin-top: 0; color: #4da8da; margin-bottom: 5px; text-align: center; }
        
        .back-link { 
            color: #4da8da; 
            text-decoration: none; 
            border: 1px solid #4da8da; 
            padding: 8px 15px; 
            border-radius: 5px; 
            transition: all 0.2s; 
            align-self: flex-start; 
            margin-left: 10%; 
            margin-bottom: 10px; 
        }
        .back-link:hover { background-color: #4da8da; color: #121212; }
        
        .game-container { 
            background-color: #2a2a2a; 
            padding: 30px; 
            border-radius: 8px; 
            width: 80%; 
            max-width: 900px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            text-align: center; 
            box-sizing: border-box; /* Évite les débordements */
        }
        
        .hud { 
            display: flex; 
            justify-content: space-around; 
            margin-bottom: 15px; 
            background: #1e1e1e; 
            padding: 10px; 
            border-radius: 5px; 
            border: 1px solid #333;
        }
        #timer-display, #score-display { 
            font-size: 22px; 
            font-weight: bold; 
        }
        #timer-display { color: #ffeb3b; font-family: monospace; }
        #score-display { color: #00ff00; }

        .canvas-wrapper { position: relative; margin-bottom: 15px; width: 100%; }
        .canvas-label { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            font-size: 14px; 
            color: #aaa; 
            background: rgba(0,0,0,0.5); 
            padding: 3px 8px; 
            border-radius: 3px; 
        }
        
        canvas { 
            background-color: #1e1e1e; 
            border: 1px solid #444; 
            border-radius: 5px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
            width: 100%; /* Rend le canvas fluide */
            height: auto; /* Conserve le ratio */
            max-width: 900px; 
            touch-action: none; /* Empêche les zooms tactiles natifs sur le canvas */
        }
        #freqCanvas { cursor: ns-resize; }
        
        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 15px; 
        }
        .toggle-container { display: flex; align-items: center; gap: 10px; font-size: 16px; color: #ccc; cursor: pointer; text-align: left; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
        
        button { 
            padding: 12px 25px; 
            background-color: #4da8da; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background-color 0.2s; 
        }
        button:hover { background-color: #357abd; }
        
        .status { margin-bottom: 15px; font-style: italic; color: #ccc; font-size: 0.9em; }
        .victory { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00; }

        /* --- ADAPTATIONS RESPONSIVE (MOBILE) --- */
        @media (max-width: 768px) {
            .back-link { margin-left: 0; width: 100%; text-align: center; box-sizing: border-box; }
            .game-container { width: 100%; padding: 15px; }
            .hud { flex-direction: column; gap: 10px; align-items: center; }
            #timer-display, #score-display { font-size: 18px; }
            .controls { flex-direction: column; gap: 20px; align-items: stretch; }
            button { width: 100%; }
            .canvas-label { font-size: 12px; padding: 2px 6px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">⬅️ Back to Dashboard</a>

    <h1>Fourier Series Match</h1>
    
    <div class="game-container">
        <div class="hud">
            <div id="score-display">Accuracy: 0.0%</div>
            <div id="timer-display">Time: 0.0s</div>
        </div>

        <div class="status">Click/Touch and DRAG the bars in the Frequency Domain to match the red target signal!</div>

        <div class="canvas-wrapper">
            <div class="canvas-label">Time Domain (Waveform)</div>
            <canvas id="timeCanvas" width="860" height="200"></canvas>
        </div>

        <div class="canvas-wrapper">
            <div class="canvas-label">Frequency Domain (Spectrum)</div>
            <canvas id="freqCanvas" width="860" height="180"></canvas>
        </div>
        
        <div class="controls">
            <label class="toggle-container">
                <input type="checkbox" id="chkShowComponents"> 
                Show Individual Harmonics (X-Ray)
            </label>
            <button id="btnNew">New Challenge</button>
        </div>
    </div>

    <script>
        const BIN_ID = "6a280a49da38895dfea022b1"; 
        const API_KEY = "$2a$10$juGyrAPOP2NEcWv322Q5..PvFOhU5GHtvq/XPyGM2O97LKLFlOlwe";

        const tCtx = document.getElementById('timeCanvas').getContext('2d');
        const fCtx = document.getElementById('freqCanvas').getContext('2d');
        const fCanvas = document.getElementById('freqCanvas');
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const chkShowComponents = document.getElementById('chkShowComponents');
        
        const NUM_HARMONICS = 5;
        let targetHarmonics = [];
        let userHarmonics = [];
        let startTime, timerInterval, isVictorious = false;
        
        let isDragging = false;
        let activeBar = -1;

        function initHarmonics() {
            targetHarmonics = Array.from({length: NUM_HARMONICS}, () => Math.random());
            userHarmonics = Array(NUM_HARMONICS).fill(0);
        }

        function startTimer() {
            clearInterval(timerInterval);
            isVictorious = false;
            startTime = Date.now();
            timerDisplay.style.color = '#ffeb3b';
            timerInterval = setInterval(() => {
                if (!isVictorious) timerDisplay.textContent = `Time: ${((Date.now() - startTime) / 1000).toFixed(1)}s`;
            }, 100);
        }

        async function saveScore(timeTaken) {
            try {
                const nickname = localStorage.getItem('nickname') || 'Anonymous Player';
                let response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
                let data = await response.json();
                let allScores = data.record;

                allScores.scores_filter.push({ name: nickname, score: timeTaken });
                allScores.scores_filter.sort((a, b) => a.score - b.score); 
                allScores.scores_filter = allScores.scores_filter.slice(0, 10);

                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify(allScores)
                });
            } catch (err) {
                console.error("Erreur de sauvegarde :", err);
            }
        }

        function drawTimeDomain() {
            tCtx.clearRect(0, 0, 860, 200);
            const centerY = 100;
            const ampScale = 40; 

            tCtx.strokeStyle = '#333'; tCtx.lineWidth = 1; tCtx.beginPath();
            tCtx.moveTo(0, centerY); tCtx.lineTo(860, centerY); tCtx.stroke();

            tCtx.strokeStyle = 'rgba(255, 80, 80, 0.8)'; tCtx.lineWidth = 2; tCtx.setLineDash([8,6]); tCtx.beginPath();
            for(let x=0; x<860; x++) { 
                let y = centerY - (targetHarmonics.reduce((a,v,i) => a + v * Math.sin((x/60)*(i*2+1)), 0) * ampScale); 
                x===0 ? tCtx.moveTo(x,y) : tCtx.lineTo(x,y); 
            }
            tCtx.stroke(); tCtx.setLineDash([]);

            if (chkShowComponents.checked) {
                tCtx.lineWidth = 1;
                for (let i = 0; i < NUM_HARMONICS; i++) {
                    tCtx.strokeStyle = `hsla(${200 + i*30}, 100%, 50%, 0.3)`;
                    tCtx.beginPath();
                    for(let x=0; x<860; x++) {
                        let y = centerY - (userHarmonics[i] * Math.sin((x/60)*(i*2+1)) * ampScale);
                        x===0 ? tCtx.moveTo(x,y) : tCtx.lineTo(x,y);
                    }
                    tCtx.stroke();
                }
            }

            tCtx.strokeStyle = '#00d2ff'; tCtx.lineWidth = 3; tCtx.beginPath();
            for(let x=0; x<860; x++) { 
                let y = centerY - (userHarmonics.reduce((a,v,i) => a + v * Math.sin((x/60)*(i*2+1)), 0) * ampScale); 
                x===0 ? tCtx.moveTo(x,y) : tCtx.lineTo(x,y); 
            }
            tCtx.stroke();
        }

        function drawFreqDomain() {
            fCtx.clearRect(0, 0, 860, 180);
            
            const barWidth = 50;
            const spacing = (860 - (NUM_HARMONICS * barWidth)) / (NUM_HARMONICS + 1);
            const baseLine = 150;
            const maxBarHeight = 120;

            fCtx.strokeStyle = '#555'; fCtx.lineWidth = 2; fCtx.beginPath();
            fCtx.moveTo(0, baseLine); fCtx.lineTo(860, baseLine); fCtx.stroke();

            for(let i=0; i<NUM_HARMONICS; i++) {
                let startX = spacing + i * (barWidth + spacing);
                
                fCtx.strokeStyle = '#444'; fCtx.lineWidth = 1; 
                fCtx.strokeRect(startX, baseLine - maxBarHeight, barWidth, maxBarHeight);
                
                fCtx.fillStyle = '#aaa'; fCtx.font = "14px sans-serif"; fCtx.textAlign = "center";
                fCtx.fillText(`${i*2+1}f`, startX + barWidth/2, baseLine + 20);

                let barHeight = userHarmonics[i] * maxBarHeight;
                fCtx.fillStyle = (activeBar === i) ? '#ffffff' : '#00d2ff';
                fCtx.fillRect(startX, baseLine - barHeight, barWidth, barHeight);
            }
        }

        function calculateScore() {
            let diff = userHarmonics.reduce((acc, h, i) => acc + Math.abs(h - targetHarmonics[i]), 0);
            let accuracy = Math.max(0, 100 - (diff * (100 / NUM_HARMONICS))); 
            
            if (!isVictorious) {
                scoreDisplay.textContent = `Accuracy: ${accuracy.toFixed(1)}%`;
                scoreDisplay.className = '';
            }

            if(!isVictorious && accuracy >= 94) {
                isVictorious = true; 
                clearInterval(timerInterval);
                const finalTime = ((Date.now() - startTime) / 1000);
                scoreDisplay.textContent = `🎯 PERFECT MATCH! (${accuracy.toFixed(1)}%)`;
                scoreDisplay.className = 'victory';
                timerDisplay.style.color = '#00ff00';
                saveScore(finalTime);
            }
        }

        function drawAll() {
            drawTimeDomain();
            drawFreqDomain();
            calculateScore();
        }

        // --- GESTION UNIFIÉE SOURIS & TACTILE ---
        function getBarIndex(mouseX) {
            const barWidth = 50;
            const spacing = (860 - (NUM_HARMONICS * barWidth)) / (NUM_HARMONICS + 1);
            for(let i=0; i<NUM_HARMONICS; i++) {
                let startX = spacing + i * (barWidth + spacing);
                if (mouseX >= startX && mouseX <= startX + barWidth) return i;
            }
            return -1;
        }

        function updateBarHeight(mouseY) {
            if (activeBar === -1) return;
            const baseLine = 150;
            const maxBarHeight = 120;
            let val = (baseLine - mouseY) / maxBarHeight;
            userHarmonics[activeBar] = Math.min(1, Math.max(0, val));
            drawAll();
        }

        function handlePointerDown(clientX, clientY) {
            if(isVictorious) return;
            const rect = fCanvas.getBoundingClientRect();
            const mouseX = (clientX - rect.left) * (fCanvas.width / rect.width);
            activeBar = getBarIndex(mouseX);
            if (activeBar !== -1) {
                isDragging = true;
                updateBarHeight((clientY - rect.top) * (fCanvas.height / rect.height));
            }
        }

        function handlePointerMove(clientX, clientY) {
            if(isVictorious) return;
            const rect = fCanvas.getBoundingClientRect();
            if (isDragging) {
                updateBarHeight((clientY - rect.top) * (fCanvas.height / rect.height));
            } else {
                const mouseX = (clientX - rect.left) * (fCanvas.width / rect.width);
                let hoverBar = getBarIndex(mouseX);
                if(hoverBar !== activeBar) { activeBar = hoverBar; drawFreqDomain(); }
            }
        }

        function handlePointerUp() {
            isDragging = false; 
            activeBar = -1; 
            drawFreqDomain();
        }

        // Événements Souris
        fCanvas.addEventListener('mousedown', (e) => handlePointerDown(e.clientX, e.clientY));
        fCanvas.addEventListener('mousemove', (e) => handlePointerMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handlePointerUp);

        // Événements Tactiles (Smartphones/Tablettes)
        fCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Empêche le scroll de l'écran quand on joue
            handlePointerDown(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        
        fCanvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handlePointerMove(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        
        window.addEventListener('touchend', handlePointerUp);

        // Autres contrôles
        chkShowComponents.addEventListener('change', drawAll);
        document.getElementById('btnNew').addEventListener('click', () => {
            initHarmonics();
            startTimer();
            drawAll();
        });

        // Lancement initial
        initHarmonics();
        startTimer();
        drawAll();
    </script>
</body>
</html>
