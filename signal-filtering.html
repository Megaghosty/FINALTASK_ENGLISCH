<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fourier Series Match</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 20px 15px;
            box-sizing: border-box;
        }
        
        h1 { margin-top: 0; color: #4da8da; margin-bottom: 10px; text-align: center; font-size: 1.8em; }
        
        .back-link { 
            color: #4da8da; 
            text-decoration: none; 
            border: 1px solid #4da8da; 
            padding: 8px 15px; 
            border-radius: 5px; 
            transition: all 0.2s; 
            align-self: flex-start; 
            margin-bottom: 15px; 
        }
        .back-link:hover { background-color: #4da8da; color: #121212; }
        
        .game-container { 
            background-color: #2a2a2a; 
            padding: 20px; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 900px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            box-sizing: border-box; 
        }
        
        .hud { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            background: #1e1e1e; 
            padding: 10px 15px; 
            border-radius: 5px; 
            border: 1px solid #333;
        }
        #timer-display, #score-display { font-size: 1.2em; font-weight: bold; }
        #timer-display { color: #ffeb3b; font-family: monospace; }
        #score-display { color: #00ff00; }

        .canvas-wrapper { position: relative; margin-bottom: 15px; width: 100%; }
        .canvas-label { 
            position: absolute; 
            top: 5px; 
            left: 5px; 
            font-size: 12px; 
            color: #aaa; 
            background: rgba(0,0,0,0.6); 
            padding: 3px 6px; 
            border-radius: 3px; 
            pointer-events: none;
        }
        
        /* Hauteur fixe en CSS pour garantir l'espace tactile sur mobile */
        canvas { 
            background-color: #1e1e1e; 
            border: 1px solid #444; 
            border-radius: 5px; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); 
            width: 100%; 
            height: 200px; 
            display: block;
            touch-action: none; /* Désactive le scroll de la page sur le canvas */
        }
        #freqCanvas { cursor: ns-resize; }
        
        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 15px; 
            flex-wrap: wrap;
            gap: 15px;
        }
        .toggle-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.95em; 
            color: #ccc; 
            cursor: pointer; 
        }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; margin: 0; }
        
        button { 
            padding: 12px 25px; 
            background-color: #4da8da; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background-color 0.2s; 
        }
        button:hover { background-color: #357abd; }
        
        .status { margin-bottom: 15px; font-style: italic; color: #aaa; font-size: 0.9em; text-align: center; line-height: 1.4; }
        .victory { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00; }

        /* Adaptations spécifiques aux téléphones */
        @media (max-width: 600px) {
            .hud { flex-direction: column; align-items: center; gap: 8px; text-align: center; }
            .controls { flex-direction: column; align-items: stretch; }
            button { width: 100%; }
            canvas { height: 180px; } /* Légèrement plus petit mais reste jouable */
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">⬅️ Back</a>

    <h1>Fourier Series Match</h1>
    
    <div class="game-container">
        <div class="hud">
            <div id="score-display">Accuracy: 0.0%</div>
            <div id="timer-display">Time: 0.0s</div>
        </div>

        <div class="status">Slide your finger up and down on the bottom bars to match the red signal!</div>

        <div class="canvas-wrapper">
            <div class="canvas-label">Waveform</div>
            <canvas id="timeCanvas"></canvas>
        </div>

        <div class="canvas-wrapper">
            <div class="canvas-label">Frequencies</div>
            <canvas id="freqCanvas"></canvas>
        </div>
        
        <div class="controls">
            <label class="toggle-container">
                <input type="checkbox" id="chkShowComponents"> 
                Show Details (X-Ray)
            </label>
            <button id="btnNew">New Challenge</button>
        </div>
    </div>

    <script>
        const BIN_ID = "6a280a49da38895dfea022b1"; 
        const API_KEY = "$2a$10$juGyrAPOP2NEcWv322Q5..PvFOhU5GHtvq/XPyGM2O97LKLFlOlwe";

        const tCanvas = document.getElementById('timeCanvas');
        const fCanvas = document.getElementById('freqCanvas');
        const tCtx = tCanvas.getContext('2d');
        const fCtx = fCanvas.getContext('2d');
        
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const chkShowComponents = document.getElementById('chkShowComponents');
        
        const NUM_HARMONICS = 5;
        let targetHarmonics = [];
        let userHarmonics = [];
        let startTime, timerInterval, isVictorious = false;
        
        let isDragging = false;
        let activeBar = -1;

        // Variables dynamiques pour le canvas (vrai responsive)
        let fW, fH, tW, tH;
        let barWidth, spacing, baseLine, maxBarHeight;

        function initHarmonics() {
            targetHarmonics = Array.from({length: NUM_HARMONICS}, () => Math.random());
            userHarmonics = Array(NUM_HARMONICS).fill(0);
        }

        function startTimer() {
            clearInterval(timerInterval);
            isVictorious = false;
            startTime = Date.now();
            timerDisplay.style.color = '#ffeb3b';
            timerInterval = setInterval(() => {
                if (!isVictorious) timerDisplay.textContent = `Time: ${((Date.now() - startTime) / 1000).toFixed(1)}s`;
            }, 100);
        }

        async function saveScore(timeTaken) {
            try {
                const nickname = localStorage.getItem('nickname') || 'Anonymous Player';
                let response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
                let data = await response.json();
                let allScores = data.record;

                allScores.scores_filter.push({ name: nickname, score: timeTaken });
                allScores.scores_filter.sort((a, b) => a.score - b.score); 
                allScores.scores_filter = allScores.scores_filter.slice(0, 10);

                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify(allScores)
                });
            } catch (err) {
                console.error("Save error:", err);
            }
        }

        // Met à jour la taille interne des Canvas pour s'adapter à la taille CSS
        function resizeCanvas() {
            tW = tCanvas.clientWidth;
            tH = tCanvas.clientHeight;
            tCanvas.width = tW;
            tCanvas.height = tH;

            fW = fCanvas.clientWidth;
            fH = fCanvas.clientHeight;
            fCanvas.width = fW;
            fCanvas.height = fH;

            // Recalcul des proportions des barres tactiles
            barWidth = Math.min(50, fW / (NUM_HARMONICS * 1.5));
            spacing = (fW - (NUM_HARMONICS * barWidth)) / (NUM_HARMONICS + 1);
            baseLine = fH * 0.85;
            maxBarHeight = fH * 0.65;

            if (targetHarmonics.length > 0) drawAll();
        }

        function drawTimeDomain() {
            tCtx.clearRect(0, 0, tW, tH);
            const centerY = tH / 2;
            const ampScale = tH * 0.4; 

            // Axe central
            tCtx.strokeStyle = '#333'; tCtx.lineWidth = 1; tCtx.beginPath();
            tCtx.moveTo(0, centerY); tCtx.lineTo(tW, centerY); tCtx.stroke();

            // Cible
            tCtx.strokeStyle = 'rgba(255, 80, 80, 0.8)'; tCtx.lineWidth = 2; tCtx.setLineDash([8,6]); tCtx.beginPath();
            for(let x=0; x<tW; x++) { 
                let y = centerY - (targetHarmonics.reduce((a,v,i) => a + v * Math.sin((x/(tW/14))*(i*2+1)), 0) * ampScale); 
                x===0 ? tCtx.moveTo(x,y) : tCtx.lineTo(x,y); 
            }
            tCtx.stroke(); tCtx.setLineDash([]);

            // Mode Rayon X
            if (chkShowComponents.checked) {
                tCtx.lineWidth = 1;
                for (let i = 0; i < NUM_HARMONICS; i++) {
                    tCtx.strokeStyle = `hsla(${200 + i*30}, 100%, 50%, 0.3)`;
                    tCtx.beginPath();
                    for(let x=0; x<tW; x++) {
                        let y = centerY - (userHarmonics[i] * Math.sin((x/(tW/14))*(i*2+1)) * ampScale);
                        x===0 ? tCtx.moveTo(x,y) : tCtx.lineTo(x,y);
                    }
                    tCtx.stroke();
                }
            }

            // Signal Joueur
            tCtx.strokeStyle = '#00d2ff'; tCtx.lineWidth = 3; tCtx.beginPath();
            for(let x=0; x<tW; x++) { 
                let y = centerY - (userHarmonics.reduce((a,v,i) => a + v * Math.sin((x/(tW/14))*(i*2+1)), 0) * ampScale); 
                x===0 ? tCtx.moveTo(x,y) : tCtx.lineTo(x,y); 
            }
            tCtx.stroke();
        }

        function drawFreqDomain() {
            fCtx.clearRect(0, 0, fW, fH);

            // Ligne de base
            fCtx.strokeStyle = '#555'; fCtx.lineWidth = 2; fCtx.beginPath();
            fCtx.moveTo(0, baseLine); fCtx.lineTo(fW, baseLine); fCtx.stroke();

            for(let i=0; i<NUM_HARMONICS; i++) {
                let startX = spacing + i * (barWidth + spacing);
                
                // Contour max
                fCtx.strokeStyle = '#444'; fCtx.lineWidth = 1; 
                fCtx.strokeRect(startX, baseLine - maxBarHeight, barWidth, maxBarHeight);
                
                // Texte
                fCtx.fillStyle = '#aaa'; fCtx.font = "14px sans-serif"; fCtx.textAlign = "center";
                fCtx.fillText(`${i*2+1}f`, startX + barWidth/2, baseLine + 20);

                // Remplissage dynamique
                let barH = userHarmonics[i] * maxBarHeight;
                fCtx.fillStyle = (activeBar === i) ? '#ffffff' : '#00d2ff';
                fCtx.fillRect(startX, baseLine - barH, barWidth, barH);
            }
        }

        function calculateScore() {
            let diff = userHarmonics.reduce((acc, h, i) => acc + Math.abs(h - targetHarmonics[i]), 0);
            let accuracy = Math.max(0, 100 - (diff * (100 / NUM_HARMONICS))); 
            
            if (!isVictorious) {
                scoreDisplay.textContent = `Accuracy: ${accuracy.toFixed(1)}%`;
                scoreDisplay.className = '';
            }

            if(!isVictorious && accuracy >= 94) {
                isVictorious = true; 
                clearInterval(timerInterval);
                const finalTime = ((Date.now() - startTime) / 1000);
                scoreDisplay.textContent = `🎯 PERFECT MATCH! (${accuracy.toFixed(1)}%)`;
                scoreDisplay.className = 'victory';
                timerDisplay.style.color = '#00ff00';
                saveScore(finalTime);
            }
        }

        function drawAll() {
            drawTimeDomain();
            drawFreqDomain();
            calculateScore();
        }

        // --- GESTION DES INTERACTIONS ---
        function getBarIndex(x) {
            for(let i=0; i<NUM_HARMONICS; i++) {
                let startX = spacing + i * (barWidth + spacing);
                // Hitbox élargie pour les doigts sur mobile
                let touchPadding = 15; 
                if (x >= startX - touchPadding && x <= startX + barWidth + touchPadding) return i;
            }
            return -1;
        }

        function updateBarHeight(y) {
            if (activeBar === -1) return;
            let val = (baseLine - y) / maxBarHeight;
            userHarmonics[activeBar] = Math.min(1, Math.max(0, val));
            drawAll();
        }

        function getMousePos(e) {
            const rect = fCanvas.getBoundingClientRect();
            // Puisque canvas.width = rect.width, on a plus besoin de ratio complexe
            let clientX = e.clientX;
            let clientY = e.clientY;
            if(e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function handleStart(e) {
            if(isVictorious) return;
            const pos = getMousePos(e);
            activeBar = getBarIndex(pos.x);
            if (activeBar !== -1) {
                isDragging = true;
                updateBarHeight(pos.y);
            }
        }

        function handleMove(e) {
            if(isVictorious) return;
            const pos = getMousePos(e);
            if (isDragging) {
                updateBarHeight(pos.y);
            } else if (!e.touches) {
                // Survol visuel uniquement pour la souris
                let hoverBar = getBarIndex(pos.x);
                if(hoverBar !== activeBar) { activeBar = hoverBar; drawFreqDomain(); }
            }
        }

        function handleEnd() {
            isDragging = false; 
            activeBar = -1; 
            drawFreqDomain();
        }

        // Événements Souris
        fCanvas.addEventListener('mousedown', handleStart);
        fCanvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        // Événements Tactiles (Smartphones)
        fCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, { passive: false });
        fCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // Resize Listener pour recalculer en cas de rotation d'écran
        window.addEventListener('resize', resizeCanvas);

        chkShowComponents.addEventListener('change', drawAll);
        document.getElementById('btnNew').addEventListener('click', () => {
            initHarmonics();
            startTimer();
            drawAll();
        });

        // Lancement
        resizeCanvas();
        initHarmonics();
        startTimer();
    </script>
</body>
</html>
