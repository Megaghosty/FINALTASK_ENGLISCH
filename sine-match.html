<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sine Wave Match</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        h1 { margin-top: 0; color: #4da8da; margin-bottom: 5px; }
        .back-link { color: #4da8da; text-decoration: none; margin-bottom: 10px; border: 1px solid #4da8da; padding: 8px 15px; border-radius: 5px; align-self: flex-start; margin-left: 10%; }
        .back-link:hover { background-color: #4da8da; color: #121212; }
        #score-display { font-size: 24px; font-weight: bold; margin-bottom: 5px; text-align: center; }
        #timer-display { font-size: 20px; color: #ffeb3b; margin-bottom: 15px; font-family: monospace; }
        
        canvas { background-color: #1e1e1e; border: 2px solid #333; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px; width: 80%; max-width: 900px; height: auto; aspect-ratio: 8/3.5; }
        .controls { background-color: #2a2a2a; padding: 20px; border-radius: 8px; width: 80%; max-width: 600px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .slider-container { display: flex; flex-direction: column; margin-bottom: 15px; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; }
        
        button { width: 100%; padding: 12px; background-color: #4da8da; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.2s; margin-top: 10px; }
        button:hover { background-color: #357abd; }
        
        .victory { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">⬅️ Back to Dashboard</a>

    <h1>Sine Wave Match</h1>
    <div id="score-display">Accuracy: 0.0%</div>
    <div id="timer-display">Time: 0.0s</div>
    
    <canvas id="waveCanvas" width="800" height="350"></canvas>

    <div class="controls">
        <div class="slider-container">
            <div class="slider-header">
                <span>Amplitude (A)</span>
                <span id="valA">1.0</span>
            </div>
            <input type="range" id="sliderA" min="0.5" max="3" step="0.1" value="1">
        </div>

        <div class="slider-container">
            <div class="slider-header">
                <span>Frequency (f)</span>
                <span id="valF">1.0 Hz</span>
            </div>
            <input type="range" id="sliderF" min="1" max="5" step="0.1" value="1">
        </div>

        <div class="slider-container">
            <div class="slider-header">
                <span>Phase (φ)</span>
                <span id="valP">0.0 rad</span>
            </div>
            <input type="range" id="sliderP" min="0" max="6.28" step="0.1" value="0">
        </div>

        <button id="btnNew">Generate a New Signal</button>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');

        const sliderA = document.getElementById('sliderA'), sliderF = document.getElementById('sliderF'), sliderP = document.getElementById('sliderP');
        const valA = document.getElementById('valA'), valF = document.getElementById('valF'), valP = document.getElementById('valP');
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const btnNew = document.getElementById('btnNew');

        let target = { A: 0, f: 0, p: 0 };
        let startTime;
        let timerInterval;
        let isVictorious = false;

        const rangeA = 3.0 - 0.5;
        const rangeF = 5.0 - 1.0;
        const rangeP = 6.28 - 0.0;

        function startTimer() {
            clearInterval(timerInterval);
            isVictorious = false;
            startTime = Date.now();
            timerDisplay.style.color = '#ffeb3b';
            
            timerInterval = setInterval(() => {
                if (!isVictorious) {
                    const elapsedTime = (Date.now() - startTime) / 1000;
                    timerDisplay.textContent = `Time: ${elapsedTime.toFixed(1)}s`;
                }
            }, 100);
        }

        // Feature: Auto-save score to global leaderboard from Dashboard
        function saveScore(time) {
            const nickname = localStorage.getItem('nickname') || 'Anonymous Player';
            let scores = JSON.parse(localStorage.getItem('scores_sine') || "[]");
            const existingIndex = scores.findIndex(s => s.name === nickname);
            if (existingIndex !== -1) {
                if (time < scores[existingIndex].score) {
                    scores[existingIndex].score = time; // Ecraser si le nouveau temps est meilleur
                }
            } else {
                scores.push({ name: nickname, score: time });
            }
            localStorage.setItem('scores_sine', JSON.stringify(scores));
        }

        function generateTarget() {
            target.A = (Math.random() * rangeA + 0.5).toFixed(1);
            target.f = (Math.random() * rangeF + 1.0).toFixed(1);
            target.p = (Math.random() * rangeP).toFixed(1);
            
            scoreDisplay.className = '';
            startTimer();
            updateCanvas();
        }

        function drawWave(A, f, p, color, isDashed = false) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.setLineDash(isDashed ? [10, 10] : []);

            const centerY = canvas.height / 2;
            const scaleY = (canvas.height / 2) / 3.5; 
            
            for (let x = 0; x < canvas.width; x++) {
                let t = (x / canvas.width) * 2; 
                let y = A * Math.sin(2 * Math.PI * f * t + parseFloat(p));
                let canvasY = centerY - (y * scaleY);

                if (x === 0) {
                    ctx.moveTo(x, canvasY);
                } else {
                    ctx.lineTo(x, canvasY);
                }
            }
            ctx.stroke();
        }

        function drawGrid() {
            ctx.beginPath();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.setLineDash([]);
            
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            
            for(let i = 1; i < 4; i++) {
                ctx.moveTo((canvas.width/4)*i, 0);
                ctx.lineTo((canvas.width/4)*i, canvas.height);
            }
            ctx.stroke();
        }

        function updateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            const userA = parseFloat(sliderA.value);
            const userF = parseFloat(sliderF.value);
            const userP = parseFloat(sliderP.value);

            valA.textContent = userA.toFixed(1);
            valF.textContent = userF.toFixed(1) + ' Hz';
            valP.textContent = userP.toFixed(1) + ' rad';

            // Draw Target (Red Dashed)
            drawWave(target.A, target.f, target.p, 'rgba(255, 80, 80, 0.6)', true);
            // Draw User (Blue)
            drawWave(userA, userF, userP, '#00d2ff', false);

            // Calculation
            const errA = Math.abs(userA - target.A) / rangeA;
            const errF = Math.abs(userF - target.f) / rangeF;
            const errP = Math.abs(userP - target.p) / rangeP;

            const totalError = (errA + errF + errP) / 3;
            let score = Math.max(0, (1 - totalError) * 100).toFixed(1); 
            
            if (!isVictorious) {
                if (score >= 98.0) {
                    scoreDisplay.textContent = `🎯 SIGNAL SYNCHRONIZED! (${score}%)`;
                    scoreDisplay.className = 'victory';
                    timerDisplay.style.color = '#00ff00';
                    isVictorious = true;
                    clearInterval(timerInterval);
                    
                    let finalTime = (Date.now() - startTime) / 1000;
                    saveScore(finalTime);
                } else {
                    scoreDisplay.textContent = `Accuracy: ${score}%`;
                    scoreDisplay.className = '';
                }
            }
        }

        sliderA.addEventListener('input', updateCanvas);
        sliderF.addEventListener('input', updateCanvas);
        sliderP.addEventListener('input', updateCanvas);
        btnNew.addEventListener('click', generateTarget);

        generateTarget();
    </script>
</body>
</html>
